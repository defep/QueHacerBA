services:
  postgres:
    image: postgres:16-alpine
    container_name: quehacerba-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quehacerba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: quehacerba-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: quehacerba
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_URL: http://quehacerba-api:3001
    container_name: quehacerba-web
    environment:
      API_BASE_URL: http://quehacerba-api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
